name: release

# Publishes the `agentcairn` distribution to PyPI via Trusted Publishing (OIDC) —
# no API tokens or secrets. Requires a Trusted Publisher to be registered on PyPI
# (and TestPyPI for the dry-run) for this repo + this workflow file.
#
# - Push a tag `vX.Y.Z`  -> build + publish to PyPI.
# - Manually run (Actions -> release -> Run workflow) -> build + publish to TestPyPI (dry-run).

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # required for Trusted Publishing (OIDC)
      contents: read # required for actions/checkout (explicit block defaults others to none)
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
      - name: Verify the lockfile
        run: uv lock --check
      - name: Build sdist + wheel
        run: uv build
      - name: Verify the wheel in stock Hermes
        env:
          PYTHONPATH: ""
        run: |
          compat="$RUNNER_TEMP/hermes-compat"
          uv venv --python 3.11 "$compat"
          uv pip install --strict \
            --python "$compat/bin/python" \
            "hermes-agent[all]==0.18.2" \
            dist/agentcairn-*.whl
          uv pip check --python "$compat/bin/python"
          "$compat/bin/python" -c "import cairn, importlib.metadata as m, pathlib, sys; from agent.memory_provider import MemoryProvider; from integrations.hermes import CairnMemoryProvider; assert m.metadata('agentcairn')['Requires-Python'] == '>=3.11'; assert 'mcp>=1.26.0' in (m.requires('agentcairn') or []); assert m.version('hermes-agent') == '0.18.2'; assert m.version('mcp') == '1.26.0'; assert pathlib.Path(cairn.__file__).resolve().is_relative_to(pathlib.Path(sys.prefix).resolve()); assert issubclass(CairnMemoryProvider, MemoryProvider)"
          if [ "$GITHUB_EVENT_NAME" = "push" ]; then
            "$compat/bin/python" -c "import importlib.metadata as m, os; assert f\"v{m.version('agentcairn')}\" == os.environ['GITHUB_REF_NAME']"
          fi
      - name: Publish to TestPyPI (manual dry-run)
        if: github.event_name == 'workflow_dispatch'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
      - name: Publish to PyPI (on v* tag)
        if: github.event_name == 'push'
        uses: pypa/gh-action-pypi-publish@release/v1
