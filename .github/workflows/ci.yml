name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Mirrors the local pre-commit hooks: ruff-format check, ruff lint, pytest.
jobs:
  check:
    name: format · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv (+ Python 3.12)
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Format check (ruff)
        run: uv run ruff format --check .

      - name: Lint (ruff)
        run: uv run ruff check .

      - name: Tests (pytest)
        # The FastEmbed integration test is skipped unless CAIRN_RUN_INTEGRATION=1,
        # so CI runs the fast, offline suite (no model download).
        run: uv run pytest -q

  e2e:
    name: end-to-end (recall ruler + MCP stdio)
    # Gated end-to-end suite: the recall-quality ruler plus the MCP-over-stdio
    # contract test. Only run on pushes to the default branch (and on-demand via
    # workflow_dispatch) to avoid a ~200 MB fastembed model download on every PR.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv (+ Python 3.12)
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: End-to-end tests (gated, fastembed + MCP stdio)
        run: CAIRN_E2E=1 uv run pytest tests/e2e/ -q -s
