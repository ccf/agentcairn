name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Mirrors the local pre-commit hooks: ruff-format check, ruff lint, pytest.
jobs:
  check:
    name: format · lint · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv (+ Python 3.11)
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.11"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --python 3.11

      - name: Format check (ruff)
        run: uv run --locked --python 3.11 ruff format --check .

      - name: Lint (ruff)
        run: uv run --locked --python 3.11 ruff check .

      - name: Tests (pytest)
        # The FastEmbed integration test is skipped unless CAIRN_RUN_INTEGRATION=1,
        # so CI runs the fast, offline suite (no model download).
        run: uv run --locked --python 3.11 pytest -q

      - name: Build the release artifacts
        run: uv build

      - name: Verify the wheel in stock Hermes
        env:
          CAIRN_E2E: "1"
          CAIRN_HERMES_CONTRACT: "1"
          PYTHONDONTWRITEBYTECODE: "1"
          PYTHONPATH: ""
        run: |
          compat="$RUNNER_TEMP/hermes-compat"
          uv venv --python 3.11 "$compat"
          uv pip install --strict \
            --python "$compat/bin/python" \
            "hermes-agent[all]==0.18.2" \
            pytest \
            dist/agentcairn-*.whl
          uv pip check --python "$compat/bin/python"
          "$compat/bin/python" -c "import cairn, importlib.metadata as m, pathlib, sys; assert m.metadata('agentcairn')['Requires-Python'] == '>=3.11'; assert 'mcp>=1.26.0' in (m.requires('agentcairn') or []); assert m.version('hermes-agent') == '0.18.2'; assert m.version('mcp') == '1.26.0'; assert pathlib.Path(cairn.__file__).resolve().is_relative_to(pathlib.Path(sys.prefix).resolve())"
          "$compat/bin/python" -m pytest \
            -c /dev/null \
            --rootdir="$GITHUB_WORKSPACE" \
            -p no:cacheprovider \
            tests/integrations/test_hermes_provider.py \
            tests/mcp/ \
            tests/e2e/test_mcp_contract.py \
            -q

  e2e:
    name: end-to-end (recall ruler + MCP stdio)
    # Gated end-to-end suite: the recall-quality ruler plus the MCP-over-stdio
    # contract test. Only run on pushes to the default branch (and on-demand via
    # workflow_dispatch) to avoid a ~200 MB fastembed model download on every PR.
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Install uv (+ Python 3.12)
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: End-to-end tests (gated, fastembed + MCP stdio)
        run: CAIRN_E2E=1 uv run pytest tests/e2e/ -q -s
