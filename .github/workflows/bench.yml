name: bench

on:
  pull_request:
  push:
    branches: [main]

jobs:
  bench-offline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv (+ Python 3.12)
        uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - run: uv run pytest benchmarks/tests/ -q
